# MediaMTX config — Chipmo Sentry v3 CLOUD (publish topology)
# ===========================================================================
# Store agents PUBLISH each camera to rtsp://<this-host>:8554/<path> and the
# central sentry-ai pulls rtsp://<this-host>:8554/<path> for detection, while
# browsers/agent-pc play WebRTC (WHEP) at :8889. Paths are created dynamically
# by sentry-backend (publish mode — no pull `source`) on camera register.
#
# All secrets come from env (set on the host / compose .env):
#   MTX_PUBLISH_USER / MTX_PUBLISH_PASS   — store agents (publish)
#   MTX_API_USER / MTX_API_PASS           — sentry-backend (control API)
#   MTX_PUBLIC_HOST                       — this host's PUBLIC IP or domain
#   MTX_ALLOW_ORIGIN                      — frontend origin allowed to play
#                                           WHEP/HLS (e.g. https://app.sentry.chipmo.mn).
#                                           Do NOT leave as "*" in production.
# ===========================================================================

logLevel: info
logDestinations: [stdout]

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512

###############################################################################
# Control API — sentry-backend adds/removes paths here on camera register.
# Protected by an authInternalUser with the `api` permission (see below).
###############################################################################
api: yes
apiAddress: :9997

metrics: no

###############################################################################
# Auth via sentry-backend (authHTTP). Every action (read/playback/publish/api)
# is authorized by the backend's /api/v1/internal/mediamtx-auth endpoint:
#   • read/playback → a valid per-camera read token in the URL (?jwt=…), minted
#     by the backend for authenticated org members — closes the old `user: any`
#     open read so tenants can't watch each other's cameras.
#   • publish       → the MTX_PUBLISH_USER/PASS credentials.
#   • api           → the MTX_API_USER/PASS credentials.
# Backend must have MEDIAMTX_PUBLISH_USER/PASS + MEDIAMTX_API_USER/PASS set to
# the SAME values, and (optionally) MEDIAMTX_AUTH_SECRET == this host's secret.
#   MTX_AUTH_URL e.g. https://api.sentry.chipmo.mn/api/v1/internal/mediamtx-auth
###############################################################################
authMethod: http
authHTTPAddress: ${MTX_AUTH_URL}

###############################################################################
# RTSP — agents publish here; sentry-ai pulls here.
###############################################################################
rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

###############################################################################
# HLS — fallback transport for browsers when WebRTC is blocked.
###############################################################################
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
# Scope CORS to the frontend origin (env). Tenant video must not be embeddable
# by arbitrary origins. MTX_ALLOW_ORIGIN is REQUIRED (set it to the frontend
# origin); for local-only testing set it to "*" explicitly.
hlsAllowOrigin: ${MTX_ALLOW_ORIGIN}

###############################################################################
# WebRTC / WHEP — primary low-latency transport.
# webrtcAdditionalHosts MUST include this host's PUBLIC address so the ICE
# candidates are reachable from clients. UDP :8189 is preferred; the TCP
# listener is the fallback when the client network blocks UDP.
###############################################################################
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcAdditionalHosts: [${MTX_PUBLIC_HOST}]
# Scope CORS to the frontend origin (env) — see hlsAllowOrigin above.
webrtcAllowOrigin: ${MTX_ALLOW_ORIGIN}

rtmp: no
srt: no

###############################################################################
# Recording — kept for L5 threshold-breach clip cuts. Tune retention to disk.
# In MediaMTX 1.18 recording config lives under pathDefaults (applies to every
# dynamically-created path). Without `record: yes` here, dynamic paths default
# to record:no and the L5 breach-clip cut has nothing to cut. Mirrors
# mediamtx.local.yml.
###############################################################################
pathDefaults:
  record: yes
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 60s
  recordDeleteAfter: 24h

# No static paths — sentry-backend creates them dynamically in publish mode.
paths: {}
